version: 2
updates:
  # Keep npm dependencies up to date
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"

  # Keep GitHub Actions up to date (if you use any)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
